<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube認証完了</title>
    <style>
        body
        {
            margin: 0;
            padding: 0;

            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #f5f7fb;

            font-family:
                "Segoe UI",
                "Hiragino Sans",
                sans-serif;

            color: #333333;
        }

        .card
        {
            background: white;

            width: 520px;
            max-width: 90%;

            border-radius: 24px;

            padding:
                48px 40px;

            text-align: center;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.08);
        }

        .icon
        {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .title
        {
            font-size: 32px;
            font-weight: 700;

            margin-bottom: 20px;

            color: #2f855a;
        }

        .message
        {
            font-size: 18px;

            line-height: 1.8;

            color: #555555;
        }

        .sub-message
        {
            margin-top: 18px;

            font-size: 15px;

            color: #888888;
        }

        .button
        {
            margin-top: 32px;

            border: none;

            border-radius: 12px;

            padding:
                14px 28px;

            font-size: 16px;

            cursor: pointer;

            background: #2f855a;
            color: white;

            transition: 0.2s;
        }

        .button:hover
        {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            ✅
        </div>
        <div class="title">
            認証が完了しました
        </div>
        <div class="message">
            YouTubeアカウントとの接続に成功しました!<br>
            このウィンドウは閉じても大丈夫です。
        </div>
        <div class="sub-message">
            アプリへ戻って続行してください
        </div>
    </div>
</body>
</html>
